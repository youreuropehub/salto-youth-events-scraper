<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SALTO Youth Scraper</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f8;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .box {
            background: white;
            width: 800px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        h1 {
            text-align: center;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 20px 0;
        }
        label {
            font-weight: bold;
        }
        input {
            width: 120px;
            padding: 6px;
            text-align: center;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 20px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
        button:disabled {
            background: #ccc;
        }
        #log {
            background: #000;
            color: #00ff00;
            padding: 15px;
            height: 350px;
            overflow-y: auto;
            font-family: monospace;
            border-radius: 8px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="box">
    <h1>SALTO Youth Scraper</h1>

    <div class="controls">
        <div>
            <label>Pagine</label><br>
            <input id="maxPages" type="number" value="10" min="1">
        </div>
        <div>
            <label>Eventi max</label><br>
            <input id="maxEvents" type="number" value="100" min="1">
        </div>
    </div>

    <div style="text-align:center;">
        <button id="startBtn" onclick="start()">Avvia Scraping</button>
        <button id="downloadBtn" onclick="download()" disabled>Scarica CSV</button>
    </div>

    <div id="log"></div>
</div>

<script>
    const socket = io();
    const log = document.getElementById("log");
    const startBtn = document.getElementById("startBtn");
    const downloadBtn = document.getElementById("downloadBtn");

    function add(msg) {
        log.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    function start() {
        log.innerHTML = "";
        startBtn.disabled = true;
        downloadBtn.disabled = true;

        socket.emit("start_scraping", {
            max_pages: document.getElementById("maxPages").value,
            max_events: document.getElementById("maxEvents").value
        });
    }

    function download() {
        window.location = "/download_csv";
    }

    socket.on("log", data => add(data.message));

    socket.on("scraping_done", data => {
        add(`COMPLETATO: ${data.count} eventi`);
        startBtn.disabled = false;
        downloadBtn.disabled = false;
    });
</script>
</body>
</html>
