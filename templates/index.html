<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>SALTO Youth Scraper</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<style>
body{font-family:sans-serif;background:#f0f0f0;display:flex;justify-content:center;align-items:center;height:100vh}
.container{background:#fff;padding:40px;border-radius:16px;width:700px}
input{width:120px;padding:8px;text-align:center}
button{padding:10px 20px;border-radius:30px;border:none;background:#667eea;color:#fff;font-weight:600}
#log{background:#111;color:#0f0;height:300px;overflow:auto;padding:10px;margin-top:15px}
</style>
</head>
<body>

<div class="container">
<h2>SALTO Youth Scraper</h2>

<p>
Pagine:
<input id="pages" type="number" value="5" min="1">
Eventi:
<input id="events" type="number" value="50" min="1">
</p>

<button onclick="start()">Avvia scraping</button>
<button onclick="download()" id="dl" disabled>Scarica CSV</button>

<div id="log"></div>
</div>

<script>
const socket = io();
const log = document.getElementById("log");
const dl = document.getElementById("dl");

function add(msg){
  log.innerHTML += msg + "<br>";
  log.scrollTop = log.scrollHeight;
}

function start(){
  log.innerHTML="";
  dl.disabled=true;
  socket.emit("start_scraping",{
    max_pages: document.getElementById("pages").value,
    max_events: document.getElementById("events").value
  });
}

function download(){
  window.location="/download_csv";
}

socket.on("log", d => add(d.message));
socket.on("scraping_done", d => {
  add("Completato: "+d.count+" eventi");
  dl.disabled=false;
});
</script>

</body>
</html>
