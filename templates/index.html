<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SALTO Scraper</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; }
        #log {
            white-space: pre-wrap;
            height: 80vh;
            overflow-y: scroll;
            border: 1px solid #0f0;
            padding: 10px;
        }
        button { margin: 10px 0; padding: 10px; }
    </style>
</head>
<body>

<h2>SALTO Scraper – Log live</h2>

<button onclick="startScraping()">Avvia scraping</button>
<button onclick="downloadCSV()">Download CSV</button>

<div id="log"></div>

<script>
    const socket = io();

    const logDiv = document.getElementById("log");

    function addLog(msg) {
        logDiv.textContent += msg + "\n";
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    socket.on("connect", () => addLog("✓ Connesso al server"));
    socket.on("disconnect", () => addLog("✗ Disconnesso dal server"));

    socket.on("log", data => {
        addLog(data.message);
    });

    socket.on("scraping_done", data => {
        addLog(`SCRAPING TERMINATO – ${data.count} eventi`);
    });

    function startScraping() {
        logDiv.textContent = "";
        socket.emit("start_scraping");
    }

    function downloadCSV() {
        window.location.href = "/download_csv";
    }
</script>

</body>
</html>
