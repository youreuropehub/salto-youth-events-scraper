<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>SALTO Youth Scraper</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; background:#f2f4f8; padding:40px; }
        .box { background:white; padding:30px; max-width:800px; margin:auto;
               border-radius:10px; box-shadow:0 10px 40px rgba(0,0,0,.2); }
        input { width:120px; padding:6px; text-align:center; }
        button { padding:12px 30px; margin:10px; border:none;
                 border-radius:20px; background:#667eea; color:white; }
        #log { background:black; color:#00ff00; padding:15px;
               height:350px; overflow:auto; font-family:monospace; }
    </style>
</head>
<body>
<div class="box">
    <h1>SALTO Youth Scraper</h1>

    <label>Pagine</label>
    <input id="maxPages" type="number" value="50"><br><br>

    <label>Eventi max</label>
    <input id="maxEvents" type="number" value="1000"><br><br>

    <button onclick="start()">Avvia Scraping</button>
    <button onclick="download()" id="dl" disabled>Scarica CSV</button>

    <div id="log"></div>
</div>

<script>
const socket = io();
const log = document.getElementById("log");
const dl = document.getElementById("dl");

function add(m){ log.innerHTML += m + "<br>"; log.scrollTop = log.scrollHeight; }

function start(){
    log.innerHTML="";
    dl.disabled=true;
    socket.emit("start_scraping",{
        max_pages:document.getElementById("maxPages").value,
        max_events:document.getElementById("maxEvents").value
    });
}

function download(){ window.location="/download_csv"; }

socket.on("log", d=>add(d.message));
socket.on("scraping_done", d=>dl.disabled=false);
</script>
</body>
</html>
